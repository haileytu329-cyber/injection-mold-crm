<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注塑模具外贸CRM系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-briefcase"></i> 注塑模具外贸CRM
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#dashboardTab" data-bs-toggle="tab">仪表盘</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#customersTab" data-bs-toggle="tab">客户管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="exportBtn">导出数据</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="tab-content">
            <!-- 仪表盘 -->
            <div class="tab-pane fade show active" id="dashboardTab">
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card text-white bg-primary">
                            <div class="card-body">
                                <h5 class="card-title">总客户数</h5>
                                <h2 id="totalCustomers">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-success">
                            <div class="card-body">
                                <h5 class="card-title">已成交</h5>
                                <h2 id="completedCustomers">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-info">
                            <div class="card-body">
                                <h5 class="card-title">总成交金额</h5>
                                <h2 id="totalAmount">¥0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-warning">
                            <div class="card-body">
                                <h5 class="card-title">待跟进</h5>
                                <h2 id="pendingCustomers">0</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0">按国家统计</h5>
                            </div>
                            <div class="card-body">
                                <div id="countryStats"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0">按报价状态统计</h5>
                            </div>
                            <div class="card-body">
                                <div id="statusStats"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 客户管理 -->
            <div class="tab-pane fade" id="customersTab">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">添加新客户</h5>
                    </div>
                    <div class="card-body">
                        <form id="addCustomerForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="companyName" class="form-label">公司名称 <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="companyName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="country" class="form-label">国家 <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="country" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="contactPerson" class="form-label">联系人 <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="contactPerson" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">邮箱 <span class="text-danger">*</span></label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="productType" class="form-label">产品类型 <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="productType" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="followUpDate" class="form-label">跟进日期</label>
                                    <input type="date" class="form-control" id="followUpDate">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="quoteStatus" class="form-label">报价状态</label>
                                    <select class="form-select" id="quoteStatus">
                                        <option value="未报价">未报价</option>
                                        <option value="已报价">已报价</option>
                                        <option value="已成交">已成交</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="notes" class="form-label">备注</label>
                                    <input type="text" class="form-control" id="notes" placeholder="附加备注信息">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-plus-circle"></i> 添加客户
                            </button>
                        </form>
                    </div>
                </div>

                <!-- 筛选器 -->
                <div class="card mb-4">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">筛选客户</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3 mb-3">
                                <label for="filterCountry" class="form-label">按国家筛选</label>
                                <input type="text" class="form-control" id="filterCountry" placeholder="输入国家名称">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="filterStatus" class="form-label">按报价状态筛选</label>
                                <select class="form-select" id="filterStatus">
                                    <option value="">全部状态</option>
                                    <option value="未报价">未报价</option>
                                    <option value="已报价">已报价</option>
                                    <option value="已成交">已成交</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="filterProductType" class="form-label">按产品类型筛选</label>
                                <input type="text" class="form-control" id="filterProductType" placeholder="输入产品类型">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label"> </label>
                                <button type="button" class="btn btn-info w-100" id="resetFilterBtn">
                                    <i class="bi bi-arrow-clockwise"></i> 重置
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 客户列表 -->
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">客户列表</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover" id="customersTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>公司名称</th>
                                        <th>国家</th>
                                        <th>联系人</th>
                                        <th>邮箱</th>
                                        <th>产品类型</th>
                                        <th>跟进日期</th>
                                        <th>报价状态</th>
                                        <th>成交金额</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="customersBody">
                                </tbody>
                            </table>
                        </div>
                        <div id="noDataMessage" class="alert alert-info text-center" style="display: none;">
                            暂无客户数据
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 客户详情模态框 -->
    <div class="modal fade" id="customerDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">客户详情</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul class="nav nav-tabs mb-3" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="infoTab" data-bs-toggle="tab" data-bs-target="#infoContent" type="button">
                                基本信息
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="transactionsTab" data-bs-toggle="tab" data-bs-target="#transactionsContent" type="button">
                                成交记录
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="followUpTab" data-bs-toggle="tab" data-bs-target="#followUpContent" type="button">
                                跟进记录
                            </button>
                        </li>
                    </ul>
                    <div class="tab-content">
                        <!-- 基本信息 -->
                        <div class="tab-pane fade show active" id="infoContent">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <p><strong>公司名称:</strong> <span id="detailCompanyName"></span></p>
                                    <p><strong>国家:</strong> <span id="detailCountry"></span></p>
                                    <p><strong>联系人:</strong> <span id="detailContactPerson"></span></p>
                                </div>
                                <div class="col-md-6">
                                    <p><strong>邮箱:</strong> <span id="detailEmail"></span></p>
                                    <p><strong>产品类型:</strong> <span id="detailProductType"></span></p>
                                    <p><strong>报价状态:</strong> <span id="detailQuoteStatus"></span></p>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <p><strong>跟进日期:</strong> <span id="detailFollowUpDate"></span></p>
                                    <p><strong>创建日期:</strong> <span id="detailCreatedDate"></span></p>
                                </div>
                                <div class="col-md-6">
                                    <p><strong>更新日期:</strong> <span id="detailUpdatedDate"></span></p>
                                    <p><strong>备注:</strong> <span id="detailNotes"></span></p>
                                </div>
                            </div>
                            <div class="mb-3">
                                <h6>编辑客户信息</h6>
                                <form id="editCustomerForm">
                                    <div class="row">
                                        <div class="col-md-6 mb-2">
                                            <label for="editQuoteStatus" class="form-label">报价状态</label>
                                            <select class="form-select form-select-sm" id="editQuoteStatus">
                                                <option value="未报价">未报价</option>
                                                <option value="已报价">已报价</option>
                                                <option value="已成交">已成交</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6 mb-2">
                                            <label for="editFollowUpDate" class="form-label">跟进日期</label>
                                            <input type="date" class="form-control form-control-sm" id="editFollowUpDate">
                                        </div>
                                    </div>
                                    <div class="mb-2">
                                        <label for="editNotes" class="form-label">备注</label>
                                        <textarea class="form-control form-control-sm" id="editNotes" rows="2"></textarea>
                                    </div>
                                    <button type="submit" class="btn btn-sm btn-primary">
                                        <i class="bi bi-pencil"></i> 更新
                                    </button>
                                </form>
                            </div>
                        </div>
                        <!-- 成交记录 -->
                        <div class="tab-pane fade" id="transactionsContent">
                            <div class="mb-3">
                                <h6>添加成交记录</h6>
                                <form id="addTransactionForm">
                                    <div class="row">
                                        <div class="col-md-6 mb-2">
                                            <label for="transactionAmount" class="form-label">成交金额</label>
                                            <input type="number" class="form-control form-control-sm" id="transactionAmount" step="0.01" required>
                                        </div>
                                        <div class="col-md-6 mb-2">
                                            <label for="transactionDate" class="form-label">成交日期</label>
                                            <input type="date" class="form-control form-control-sm" id="transactionDate" required>
                                        </div>
                                    </div>
                                    <div class="mb-2">
                                        <label for="transactionNotes" class="form-label">备注</label>
                                        <input type="text" class="form-control form-control-sm" id="transactionNotes" placeholder="订单号、合同等信息">
                                    </div>
                                    <button type="submit" class="btn btn-sm btn-success">
                                        <i class="bi bi-plus"></i> 添加成交记录
                                    </button>
                                </form>
                            </div>
                            <div id="transactionsList"></div>
                        </div>
                        <!-- 跟进记录 -->
                        <div class="tab-pane fade" id="followUpContent">
                            <div class="mb-3">
                                <h6>添加跟进记录</h6>
                                <form id="addFollowUpForm">
                                    <div class="row">
                                        <div class="col-md-6 mb-2">
                                            <label for="followUpDate" class="form-label">跟进日期</label>
                                            <input type="date" class="form-control form-control-sm" id="followUpDate" required>
                                        </div>
                                    </div>
                                    <div class="mb-2">
                                        <label for="followUpNotes" class="form-label">跟进内容</label>
                                        <textarea class="form-control form-control-sm" id="followUpNotes" rows="2" required></textarea>
                                    </div>
                                    <button type="submit" class="btn btn-sm btn-info">
                                        <i class="bi bi-plus"></i> 添加跟进记录
                                    </button>
                                </form>
                            </div>
                            <div id="followUpList"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" id="deleteCustomerBtn">
                        <i class="bi bi-trash"></i> 删除客户
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
